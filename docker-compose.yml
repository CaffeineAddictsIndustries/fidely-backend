services:
  postgres:
    image: postgres:16-alpine
    container_name: fidely-db
    environment:
      POSTGRES_USER: fidely
      POSTGRES_PASSWORD: fidely
      POSTGRES_DB: fidely
    ports:
      - "5432:5432"
    volumes:
      - fidely_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fidely-redis
    ports:
      - "6379:6379"
    volumes:
      - fidely_redis_data:/data

volumes:
  fidely_data:
  fidely_redis_data:
