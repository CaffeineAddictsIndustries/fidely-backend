services:
  postgres:
    image: postgres:16-alpine
    container_name: fidely-db
    environment:
      POSTGRES_USER: fidely
      POSTGRES_PASSWORD: fidely
      POSTGRES_DB: fidely
    ports:
      - "5432:5432"
    volumes:
      - fidely_data:/var/lib/postgresql/data

volumes:
  fidely_data:
